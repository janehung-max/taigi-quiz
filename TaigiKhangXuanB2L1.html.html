 <!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一課單字：ChatGPT敢會曉講閩南語</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FFDE59;
            overflow-x: hidden;
        }
        .dopamine-card {
            background-color: #FFFFFF;
            border-radius: 30px;
            box-shadow: 10px 10px 0px #FF5757;
        }
        .option-btn {
            transition: transform 0.2s, background-color 0.2s;
            border-radius: 15px;
            font-size: 1.5rem;
            border: 4px solid #000;
        }
        .option-btn:hover {
            transform: scale(1.05);
        }
        .student-btn {
            background-color: #7ED957;
            border: 3px solid #000;
            transition: all 0.2s;
        }
        .student-btn:hover {
            background-color: #5cb85c;
            transform: translateY(-3px);
        }
        .large-text {
            font-size: 2.5rem;
            line-height: 1.2;
        }
        .quiz-title {
            color: #5E17EB;
            text-shadow: 2px 2px 0px #FFBD59;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-4xl">
        <!-- 登入頁面 -->
        <div id="login-screen" class="dopamine-card p-8 text-center">
            <h1 class="text-5xl font-bold mb-8 quiz-title">台語第一課單字大考驗<br><span class="text-3xl">ChatGPT敢會曉講閩南語</span></h1>
            <p class="mb-4 font-bold text-gray-700">請點選姓名開始測驗 (隨機10題)</p>
            <div id="student-list" class="grid grid-cols-2 md:grid-cols-4 gap-4 max-h-96 overflow-y-auto p-2"></div>
        </div>

        <!-- 測驗頁面 -->
        <div id="quiz-screen" class="hidden dopamine-card p-8">
            <div class="flex justify-between items-center mb-6">
                <span id="current-user" class="text-xl font-bold bg-purple-100 px-4 py-2 rounded-full border-2 border-purple-500 text-purple-700"></span>
                <span id="progress" class="text-2xl font-bold text-gray-500">1/10</span>
            </div>
            
            <div class="text-center mb-10">
                <h2 id="question-text" class="large-text font-bold text-black border-b-4 border-dashed border-yellow-400 pb-4 inline-block"></h2>
            </div>

            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            <div id="feedback" class="mt-8 text-center text-3xl font-bold hidden"></div>
        </div>

        <!-- 結果頁面 -->
        <div id="result-screen" class="hidden dopamine-card p-8 text-center">
            <h2 class="text-6xl font-bold mb-6 text-red-500">測驗結束！</h2>
            <div id="final-score" class="text-8xl font-black mb-8 text-blue-600">0</div>
            <p id="congrats-msg" class="text-3xl mb-8"></p>
            <button onclick="location.reload()" class="bg-black text-white text-3xl px-12 py-6 rounded-full hover:bg-gray-800 transition">重新開始</button>
        </div>
    </div>

    <script>
        const students = [
            { id: 1, name: "王浩軒", pinyin: "Ông Hō-hian" }, { id: 2, name: "李元閎", pinyin: "Lí Guân-hông" },
            { id: 3, name: "林晴泓", pinyin: "Lîm Tsîng-hông" }, { id: 4, name: "翁梓恩", pinyin: "Ong Tsú-un" },
            { id: 5, name: "高子鈞", pinyin: "Ko Tsú-kun" }, { id: 6, name: "黃紹恩", pinyin: "N̂g Siāu-un" },
            { id: 7, name: "黃鼎勝", pinyin: "N̂g Tíng-sìng" }, { id: 8, name: "謝孟哲", pinyin: "Siā Bīng-tiat" },
            { id: 9, name: "蘇君豪", pinyin: "Soo Kun-hô" }, { id: 10, name: "吳恩希", pinyin: "Ngôo Un-hi" },
            { id: 11, name: "呂采甯", pinyin: "Lū Tshái-lîng" }, { id: 12, name: "周婧純", pinyin: "Tsiu Tsīng-sûn" },
            { id: 13, name: "張栩榕", pinyin: "Tiunn Hú-iông" }, { id: 14, name: "陳妍恩", pinyin: "Tân Giân-un" },
            { id: 15, name: "陳佳怡", pinyin: "Tân Ka-î" }, { id: 16, name: "陳品嘉", pinyin: "Tân Phín-ka" },
            { id: 17, name: "陳郁金", pinyin: "Tân Hiok-kim" }, { id: 18, name: "楊子葶", pinyin: "Iûnn Tsú-tîng" },
            { id: 19, name: "盧品萱", pinyin: "Lôo Phín-suan" }, { id: 20, name: "賴映如", pinyin: "Luā Iòng-jû" }
        ];

        // 語詞庫修正內容：凡勢 huān-sè
        const wordBank = [
            { han: "敢", pin: "kám", def: "嗎、難道" },
            { han: "捌", pin: "bat", def: "曾經、認識" },
            { han: "凡勢", pin: "huān-sè", def: "也許、可能" },
            { han: "抑是", pin: "ia̍h-sī", def: "或者是" },
            { han: "開講", pin: "khai-káng", def: "聊天" },
            { han: "軟體", pin: "nng-thé", def: "軟體" },
            { han: "誠合理", pin: "tsiânn ha̍p-lí", def: "很合理" },
            { han: "袂曉", pin: "buē-hiáu", def: "不會" },
            { han: "讀冊", pin: "tha̍k-tsheh", def: "讀書" },
            { han: "拄頭仔", pin: "tú-thâu-á", def: "一開始" },
            { han: "輾轉", pin: "liàn-tńg", def: "流利" },
            { han: "爾爾", pin: "niā-niā", def: "而已" },
            { han: "紲落來", pin: "suà--lo̍h-lâi", def: "接下來" },
            { han: "手機仔", pin: "tshiú-ki-á", def: "手機" },
            { han: "電腦", pin: "tiān-náu", def: "電腦" },
            { han: "智慧錶仔", pin: "tì-huī-pió-á", def: "智慧型手錶" },
            { han: "平板電腦", pin: "pênn-pán-tiān-náu", def: "平板電腦" },
            { han: "鬥相共", pin: "tàu-sann-kāng", def: "幫忙" },
            { han: "工課", pin: "khang-khuè", def: "工作" },
            { han: "𨑨迌", pin: "tshit-thô", def: "遊玩" }
        ];

        let selectedStudent = "";
        let currentQuiz = [];
        let currentIndex = 0;
        let score = 0;

        const listDiv = document.getElementById('student-list');
        students.forEach(s => {
            const btn = document.createElement('button');
            btn.className = "student-btn p-4 rounded-xl text-lg font-bold shadow-md";
            btn.innerHTML = `${s.name}<br><span class="text-xs font-normal opacity-75">${s.pinyin}</span>`;
            btn.onclick = () => startQuiz(s.name);
            listDiv.appendChild(btn);
        });

        function startQuiz(name) {
            selectedStudent = name;
            document.getElementById('current-user').innerText = `考生：${name}`;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            currentQuiz = [...wordBank].sort(() => 0.5 - Math.random()).slice(0, 10);
            showQuestion();
        }

        function showQuestion() {
            const question = currentQuiz[currentIndex];
            document.getElementById('progress').innerText = `題號: ${currentIndex + 1}/10`;
            const isHanToPin = Math.random() > 0.5;
            document.getElementById('question-text').innerText = isHanToPin ? question.han : question.pin;
            const correctAnswer = isHanToPin ? question.pin : question.han;
            const options = [correctAnswer];
            while(options.length < 4) {
                const randomWord = wordBank[Math.floor(Math.random() * wordBank.length)];
                const candidate = isHanToPin ? randomWord.pin : randomWord.han;
                if(!options.includes(candidate)) options.push(candidate);
            }
            options.sort(() => 0.5 - Math.random());
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            const colors = ['#FFBD59', '#FF5757', '#5E17EB', '#00C2CB']; 
            options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = `option-btn p-6 font-bold text-white shadow-xl`;
                btn.style.backgroundColor = colors[i % colors.length];
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, correctAnswer);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct) {
            const feedback = document.getElementById('feedback');
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.disabled = true);
            feedback.classList.remove('hidden');
            if(selected === correct) {
                score += 10;
                feedback.innerText = "答對了！🎉";
                feedback.style.color = "#7ED957";
            } else {
                feedback.innerHTML = `不對喔...😢<br><span class="text-2xl">正確是：${correct}</span>`;
                feedback.style.color = "#FF5757";
            }
            setTimeout(() => {
                feedback.classList.add('hidden');
                currentIndex++;
                if(currentIndex < 10) showQuestion();
                else showResult();
            }, 1500);
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            let msg = score === 100 ? "太強了！台語小達人！💯" : (score >= 60 ? "及格了，真棒！👍" : "再練習一下會更好！💪");
            document.getElementById('congrats-msg').innerText = msg;
        }
    </script>
</body>
</html>
